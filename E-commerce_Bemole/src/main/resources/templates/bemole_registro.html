<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bemolé — Iniciar sesión / Registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgPrincipal: '#F7F3EC',
            tarjeta:     '#FFFFFF',
            goldAcento:  '#E8B96A',
            goldCta:     '#C9963A',
            goldOscuro:  '#7A5807',
            textoOscuro: '#1A1A1A',
            fondoNav:    '#2E2E2E',
            fondoHero:   '#1A1A1A',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body:    ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .tab-active   { background: #C9963A; color: white; }
    .tab-inactive { background: transparent; color: #999; }
    /* Se cambió para que el panel de registro se muestre por defecto y el de login se oculte */
    #panel-login    { display: none; }
    #panel-registro { display: flex; }
  </style>
</head>
<body class="bg-fondoHero text-textoOscuro font-body min-h-screen flex flex-col">

  <header class="bg-fondoNav shadow-md shrink-0">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="leading-none">
        <span class="font-display text-xl font-bold text-goldCta tracking-tight">Bemolé</span>
        <span class="block text-[9px] font-light tracking-[.18em] uppercase text-goldAcento/60">Instrumentos para cada nota</span>
      </div>
      <a href="#" class="text-white/50 hover:text-goldAcento text-sm transition">← Volver a la tienda</a>
    </div>
  </header>

  <div class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md">

      <div class="text-center mb-8">
        <div class="text-5xl mb-3">🎵</div>
        <p class="text-white/40 text-sm font-light tracking-wide">Accede a tu cuenta Bemolé</p>
      </div>

      <div class="bg-tarjeta rounded-2xl shadow-2xl overflow-hidden">

        <div class="flex border-b border-[#e8e2d8]">
          <button id="tab-login" onclick="showTab('login')" class="tab-inactive flex-1 text-sm font-medium py-4 transition">
            Iniciar sesión
          </button>
          <button id="tab-registro" onclick="showTab('registro')" class="tab-active flex-1 text-sm font-medium py-4 transition">
            Crear cuenta
          </button>
        </div>

        <div id="panel-registro" class="flex-col gap-5 p-7">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium uppercase tracking-widest text-gray-400 mb-1.5">Nombre</label>
              <input type="text" placeholder="Juan" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
            </div>
            <div>
              <label class="block text-xs font-medium uppercase tracking-widest text-gray-400 mb-1.5">Apellido</label>
              <input type="text" placeholder="García" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium uppercase tracking-widest text-gray-400 mb-1.5">Correo electrónico</label>
            <input type="email" placeholder="tu@correo.com" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
          </div>
          <div>
            <label class="block text-xs font-medium uppercase tracking-widests text-gray-400 mb-1.5">Teléfono (opcional)</label>
            <input type="tel" placeholder="+52 644 000 0000" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
          </div>
          <div>
            <label class="block text-xs font-medium uppercase tracking-widest text-gray-400 mb-1.5">Contraseña</label>
            <input type="password" placeholder="Mínimo 8 caracteres" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
            <div class="mt-2 flex gap-1">
              <div class="flex-1 h-1 rounded-full bg-red-400"></div>
              <div class="flex-1 h-1 rounded-full bg-yellow-400"></div>
              <div class="flex-1 h-1 rounded-full bg-gray-200"></div>
              <div class="flex-1 h-1 rounded-full bg-gray-200"></div>
            </div>
            <p class="text-[10px] text-yellow-600 mt-1 font-light">Contraseña moderada</p>
          </div>
          <div>
            <label class="block text-xs font-medium uppercase tracking-widest text-gray-400 mb-1.5">Confirmar contraseña</label>
            <input type="password" placeholder="Repite tu contraseña" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
          </div>

          <div class="flex items-start gap-2">
            <input type="checkbox" id="terminos" class="accent-[#C9963A] mt-0.5 shrink-0"/>
            <label for="terminos" class="text-xs text-gray-500 font-light cursor-pointer leading-relaxed">
              Acepto los <a href="#" class="text-goldCta hover:underline">Términos y condiciones</a> y el <a href="#" class="text-goldCta hover:underline">Aviso de privacidad</a> de Bemolé.
            </label>
          </div>

          <div class="flex items-start gap-2">
            <input type="checkbox" id="promo" class="accent-[#C9963A] mt-0.5 shrink-0" checked/>
            <label for="promo" class="text-xs text-gray-500 font-light cursor-pointer leading-relaxed">
              Deseo recibir ofertas, novedades y noticias de Bemolé por correo.
            </label>
          </div>

          <button class="w-full bg-goldCta hover:bg-goldAcento hover:text-textoOscuro text-white font-medium text-sm py-3.5 rounded-xl transition">
            Crear mi cuenta
          </button>

          <p class="text-center text-xs text-gray-400 font-light">
            ¿Ya tienes cuenta?
            <button onclick="showTab('login')" class="text-goldCta hover:text-goldOscuro font-medium transition">Inicia sesión</button>
          </p>
        </div>

        <div id="panel-login" class="flex-col gap-5 p-7">
          <div>
            <label class="block text-xs font-medium uppercase tracking-widest text-gray-400 mb-1.5">Correo electrónico</label>
            <input type="email" placeholder="tu@correo.com" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
          </div>
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="text-xs font-medium uppercase tracking-widest text-gray-400">Contraseña</label>
              <a href="#" class="text-[11px] text-goldCta hover:text-goldOscuro transition">¿Olvidaste tu contraseña?</a>
            </div>
            <input type="password" placeholder="••••••••" class="w-full bg-bgPrincipal border border-[#e8e2d8] focus:border-goldAcento text-sm px-4 py-2.5 rounded-lg outline-none transition"/>
          </div>

          <div class="flex items-center gap-2">
            <input type="checkbox" id="remember" class="accent-[#C9963A]"/>
            <label for="remember" class="text-sm text-gray-500 font-light cursor-pointer">Recordar mi sesión</label>
          </div>

          <button class="w-full bg-goldCta hover:bg-goldAcento hover:text-textoOscuro text-white font-medium text-sm py-3.5 rounded-xl transition">
            Iniciar sesión
          </button>

          <div class="relative flex items-center gap-3">
            <div class="flex-1 h-px bg-[#e8e2d8]"></div>
            <span class="text-xs text-gray-400">o continúa con</span>
            <div class="flex-1 h-px bg-[#e8e2d8]"></div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button class="border border-[#e8e2d8] hover:border-goldAcento text-sm text-gray-600 py-2.5 rounded-lg transition flex items-center justify-center gap-2">
              <span>🇬</span> Google
            </button>
            <button class="border border-[#e8e2d8] hover:border-goldAcento text-sm text-gray-600 py-2.5 rounded-lg transition flex items-center justify-center gap-2">
              <span>📘</span> Facebook
            </button>
          </div>

          <p class="text-center text-xs text-gray-400 font-light">
            ¿No tienes cuenta?
            <button onclick="showTab('registro')" class="text-goldCta hover:text-goldOscuro font-medium transition">Regístrate gratis</button>
          </p>
        </div>

      </div>

      <p class="text-center text-white/25 text-[11px] mt-6 font-light">
        🔒 Tus datos están protegidos con encriptación SSL
      </p>
    </div>
  </div>

  <script>
    function showTab(tab) {
      const panelLogin    = document.getElementById('panel-login');
      const panelRegistro = document.getElementById('panel-registro');
      const tabLogin      = document.getElementById('tab-login');
      const tabRegistro   = document.getElementById('tab-registro');

      if (tab === 'login') {
        panelLogin.style.display    = 'flex';
        panelRegistro.style.display = 'none';
        tabLogin.className    = 'tab-active flex-1 text-sm font-medium py-4 transition';
        tabRegistro.className = 'tab-inactive flex-1 text-sm font-medium py-4 transition';
      } else {
        panelLogin.style.display    = 'none';
        panelRegistro.style.display = 'flex';
        tabLogin.className    = 'tab-inactive flex-1 text-sm font-medium py-4 transition';
        tabRegistro.className = 'tab-active flex-1 text-sm font-medium py-4 transition';
      }
    }
  </script>

</body>
</html>
